version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: realty
      POSTGRES_PASSWORD: realty
      POSTGRES_DB: realty_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realty -d realty_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://realty:realty@db:5432/realty_monitor
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      COLLECT_INTERVAL_HOURS: ${COLLECT_INTERVAL_HOURS:-6}
      SECRET_KEY: ${SECRET_KEY:-change-me}
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend:ro

volumes:
  postgres_data:
